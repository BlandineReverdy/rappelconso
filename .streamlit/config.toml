# .streamlit/config.toml
[theme]
primaryColor = "#FF0000"          # Rouge pour les boutons/interactions
backgroundColor = "#FFFFFF"       # Fond blanc
secondaryBackgroundColor = "#F0F2F6" # Gris très clair ou bleu pâle
textColor = "#000000"             # Texte principal noir (pour la lisibilité)
font = "sans serif"
